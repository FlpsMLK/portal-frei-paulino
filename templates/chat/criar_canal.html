{% extends 'base.html' %}
{% block title %}Novo Canal{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="bi bi-chat-square-plus me-2"></i>Criar Novo Canal</h1></div></div>
<div class="container" style="max-width:520px;">
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">Nome do Canal</label>{{ form.nome }}{% if form.nome.errors %}<div class="text-danger small">{{ form.nome.errors }}</div>{% endif %}</div>
        <div class="form-group"><label class="form-label">Descrição</label>{{ form.descricao }}</div>
        <div class="form-group"><label class="form-label">Tipo</label>{{ form.tipo }}</div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-2"></i>Criar Canal</button>
          <a href="{% url 'lista_canais' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
