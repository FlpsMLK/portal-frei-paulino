{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1>{{ titulo }}</h1></div></div>
<div class="container" style="max-width:720px;">
  <div class="card">
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-2"></i>Salvar</button>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
